<div class="space-y-4">
  <div class="flex items-center gap-2 mb-4">
    <button onclick="loadPage('tournaments')" class="text-gray-400">←</button>
    <h2 id="viewTName" class="text-xl font-bold text-green-400 font-bold"></h2>
  </div>

  <div class="flex border-b border-gray-800">
    <button onclick="switchTab('details')" class="flex-1 pb-2 border-b-2 border-green-600 text-sm">Details</button>
    <button onclick="switchTab('fixtures')" class="flex-1 pb-2 border-b-2 border-transparent text-sm">Fixtures</button>
    <button onclick="switchTab('points')" class="flex-1 pb-2 border-b-2 border-transparent text-sm">Points</button>
  </div>

  <div id="tabContent" class="mt-4">
    </div>
</div>

<div id="matchSetterModal" class="fixed inset-0 bg-black bg-opacity-80 hidden items-center justify-center z-[110] p-4">
  <div class="bg-gray-900 p-6 rounded-2xl w-full max-w-sm border border-gray-700 shadow-2xl">
    <h3 class="text-white font-bold text-lg mb-4 text-center border-b border-gray-800 pb-2">मॅच सेट करा</h3>
    
    <div class="space-y-4">
      <div>
        <label class="text-[10px] text-gray-400 uppercase tracking-wider">संघ १ (Team A)</label>
        <select id="mTeamA" class="w-full mt-1 p-3 bg-gray-800 rounded-xl text-sm text-white border border-gray-700 focus:border-green-500 outline-none"></select>
      </div>
      
      <div class="text-center text-gray-600 font-bold">VS</div>

      <div>
        <label class="text-[10px] text-gray-400 uppercase tracking-wider">संघ २ (Team B)</label>
        <select id="mTeamB" class="w-full mt-1 p-3 bg-gray-800 rounded-xl text-sm text-white border border-gray-700 focus:border-green-500 outline-none"></select>
      </div>
      
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-[10px] text-gray-400">तारीख</label>
          <input id="mDate" type="date" class="w-full mt-1 p-2 bg-gray-800 rounded-lg text-xs text-white border border-gray-700">
        </div>
        <div>
          <label class="text-[10px] text-gray-400">वेळ</label>
          <input id="mTime" type="time" class="w-full mt-1 p-2 bg-gray-800 rounded-lg text-xs text-white border border-gray-700">
        </div>
      </div>
    </div>

    <div class="flex flex-col gap-2 mt-6">
      <button onclick="saveMatchDetails()" class="w-full bg-green-600 hover:bg-green-700 p-3 rounded-xl text-white font-bold text-sm transition-colors">
        सेव्ह करा (Save)
      </button>
      <button onclick="closeMatchSetter()" class="w-full py-2 text-gray-400 text-xs hover:text-white">
        रद्द करा (Cancel)
      </button>
    </div>
  </div>
</div>
