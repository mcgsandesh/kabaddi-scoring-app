<div class="flex flex-col bg-black text-white p-3 overflow-hidden select-none" style="height: 100vh;">
    
    <div class="bg-gray-900 rounded-2xl p-3 border border-gray-800 shrink-0 shadow-2xl">
        <div class="grid grid-cols-3 gap-2">
            <div class="text-center">
                <p class="text-[9px] text-gray-500 font-bold uppercase truncate">Tigers Mumbai</p>
                <h1 id="scoreA" class="text-4xl font-black text-white leading-none my-1">0</h1>
                <div id="emptyA" class="flex justify-center gap-1.5 mb-2">
                    <span class="w-2 h-2 rounded-full bg-gray-700"></span>
                    <span class="w-2 h-2 rounded-full bg-gray-700"></span>
                    <span class="w-2 h-2 rounded-full bg-gray-700"></span>
                </div>
                <div class="text-[10px] text-green-500 tracking-tighter opacity-80">👤👤👤👤👤👤👤</div>
            </div>

            <div class="flex flex-col items-center justify-center border-x border-gray-800/50">
                <div class="text-center mb-1">
                    <p class="text-[7px] text-orange-500 font-black uppercase tracking-widest">1st Half</p>
                    <p id="matchTimer" class="text-lg font-mono font-bold text-gray-200 leading-none">20:00</p>
                </div>
                <div class="w-full border-t border-gray-800 my-1"></div>
                <div class="text-center">
                    <p id="raidTimer" class="text-4xl font-black text-red-600 leading-none">30</p>
                    <p class="text-[7px] text-gray-500 font-bold uppercase mt-1">Raid Timer</p>
                </div>
            </div>

            <div class="text-center">
                <p class="text-[9px] text-gray-500 font-bold uppercase truncate">Warriors Thane</p>
                <h1 id="scoreB" class="text-4xl font-black text-white leading-none my-1">0</h1>
                <div id="emptyB" class="flex justify-center gap-1.5 mb-2">
                    <span class="w-2 h-2 rounded-full bg-gray-700"></span>
                    <span class="w-2 h-2 rounded-full bg-gray-700"></span>
                    <span class="w-2 h-2 rounded-full bg-gray-700"></span>
                </div>
                <div class="text-[10px] text-green-500 tracking-tighter opacity-80">👤👤👤👤👤👤👤</div>
            </div>
        </div>
    </div>

    <div class="bg-orange-950/20 border border-orange-500/30 rounded-xl mt-3 p-3 px-4 shrink-0 shadow-lg">
        <div class="flex justify-between items-center mb-2 border-b border-orange-500/10 pb-2">
            <div class="text-[11px] font-black uppercase italic text-white">
                <span class="text-orange-500">RAIDING:</span> <span id="activeRaider">Waiting for Raider...</span>
            </div>
            <div class="bg-orange-600 text-black text-[8px] px-2 py-0.5 rounded-full font-black">LIVE ACTION</div>
        </div>
        <div class="flex justify-between gap-4">
            <div class="flex-1">
                <p class="text-[8px] text-orange-500 font-black uppercase mb-1">Top Raiders</p>
                <p class="text-[10px] font-bold text-gray-300">Aslam: 10 | Mohit: 8</p>
            </div>
            <div class="w-px bg-gray-800"></div>
            <div class="flex-1 text-right">
                <p class="text-[8px] text-blue-400 font-black uppercase mb-1">Top Defenders</p>
                <p class="text-[10px] font-bold text-gray-300">Sombir: 4 | Fazel: 3</p>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mt-4 shrink-0">
        <div class="flex flex-col gap-3 pr-2 border-r border-gray-900">
             <button id="startRaidA" onclick="startRaidTimer('A')" class="w-full bg-green-600 hover:bg-green-500 py-3 rounded-xl text-[10px] font-black uppercase mb-2 shadow-lg shadow-green-900/20">
                 Start Team A Raid
                </button>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="handleEmptyRaid('A', 'empty')" class="bg-gray-800 py-3 rounded-xl text-[9px] font-black uppercase active:bg-gray-700">Empty</button>
                <button onclick="handleBonus('A', 'bonus')" class="bg-gray-800 py-3 rounded-xl text-[9px] font-black uppercase active:bg-gray-700">Bonus</button>
            </div>
            <div class="grid grid-cols-4 gap-1.5">
                <button onclick="handlePoint('A', 'touch', 1)" class="bg-indigo-950 border border-indigo-500/30 py-3 rounded-lg text-sm font-black active:bg-indigo-600">1</button>
                <button onclick="handlePoint('A', 'touch', 2)" class="bg-indigo-950 border border-indigo-500/30 py-3 rounded-lg text-sm font-black active:bg-indigo-600">2</button>
                <button onclick="handlePoint('A', 'touch', 3)" class="bg-indigo-950 border border-indigo-500/30 py-3 rounded-lg text-sm font-black active:bg-indigo-600">3</button>
                <button class="bg-gray-800 text-gray-500 py-3 rounded-lg text-[8px] font-bold">4,5,6</button>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="handlePoint('A', 'tackle')" class="bg-gray-800 py-2.5 rounded-lg text-[8px] font-bold uppercase">Tackle</button>
                <button onclick="handlePoint('A', 'super_tackle')" class="bg-gray-800 py-2.5 rounded-lg text-[8px] font-bold uppercase">S.Tack</button>
                <button onclick="handlePoint('A', 'self_out')" class="bg-gray-800 py-2.5 rounded-lg text-[8px] font-bold uppercase">Self</button>
                <button onclick="handlePoint('A', 'all_out')" class="bg-gray-800 py-2.5 rounded-lg text-[8px] font-bold uppercase">All Out</button>
                <button class="bg-gray-800 py-2.5 rounded-lg text-[8px] font-bold text-blue-400">TECH</button>
                <button class="bg-gray-800 py-2.5 rounded-lg text-[8px] font-bold text-red-500 underline">UNDO</button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button class="bg-gray-800 py-2.5 rounded-lg text-[8px] font-bold uppercase">Timeout</button>
                <button class="bg-gray-800 py-2.5 rounded-lg text-[8px] font-bold uppercase">Sub</button>
            </div>
            <p class="text-[8px] text-gray-600 font-bold uppercase">Out: <span id="outSequenceA" class="text-gray-400">5, 6, 8...</span></p>
        </div>

        <div class="flex flex-col gap-3">
                <button id="startRaidB" onclick="startRaidTimer('B')" class="w-full bg-green-600 hover:bg-green-500 py-3 rounded-xl text-[10px] font-black uppercase mb-2 shadow-lg shadow-green-900/20">
                    Start Team B Raid
                </button>
            <div class="grid grid-cols-2 gap-2">

                <button onclick="handleEmptyRaid('B', 'empty')" class="bg-gray-800 py-3 rounded-xl text-[9px] font-black uppercase active:bg-gray-700">Empty</button>
                <button onclick="handleBonus('B', 'bonus')" class="bg-gray-800 py-3 rounded-xl text-[9px] font-black uppercase active:bg-gray-700">Bonus</button>
            </div>
            <div class="grid grid-cols-4 gap-1.5">
                <button onclick="handlePoint('B', 'touch', 1)" class="bg-indigo-950 border border-indigo-500/30 py-3 rounded-lg text-sm font-black active:bg-indigo-600">1</button>
                <button onclick="handlePoint('B', 'touch', 2)" class="bg-indigo-950 border border-indigo-500/30 py-3 rounded-lg text-sm font-black active:bg-indigo-600">2</button>
                <button onclick="handlePoint('B', 'touch', 3)" class="bg-indigo-950 border border-indigo-500/30 py-3 rounded-lg text-sm font-black active:bg-indigo-600">3</button>
                <button class="bg-gray-800 text-gray-500 py-3 rounded-lg text-[8px] font-bold">4,5,6</button>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="handlePoint('B', 'tackle')" class="bg-gray-800 py-2.5 rounded-lg text-[8px] font-bold uppercase">Tackle</button>
                <button onclick="handlePoint('B', 'super_tackle')" class="bg-gray-800 py-2.5 rounded-lg text-[8px] font-bold uppercase">S.Tack</button>
                <button onclick="handlePoint('B', 'self_out')" class="bg-gray-800 py-2.5 rounded-lg text-[8px] font-bold uppercase">Self</button>
                <button onclick="handlePoint('B', 'all_out')" class="bg-gray-800 py-2.5 rounded-lg text-[8px] font-bold uppercase">All Out</button>
                <button class="bg-gray-800 py-2.5 rounded-lg text-[8px] font-bold text-blue-400">TECH</button>
                <button class="bg-gray-800 py-2.5 rounded-lg text-[8px] font-bold text-red-500 underline">UNDO</button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button class="bg-gray-800 py-2.5 rounded-lg text-[8px] font-bold uppercase">Timeout</button>
                <button class="bg-gray-800 py-2.5 rounded-lg text-[8px] font-bold uppercase">Sub</button>
            </div>
            <p class="text-[8px] text-gray-600 font-bold uppercase text-right">Out: <span id="outSequenceB" class="text-gray-400">2, 1, 4...</span></p>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mt-6 shrink-0 pb-10">
        <button onclick="pauseMatch()" class="bg-gray-800 py-4 rounded-2xl text-[10px] font-black uppercase border border-gray-700 shadow-xl active:scale-95">Pause Match</button>
        <button onclick="endMatch()" class="bg-red-900/20 text-red-500 py-4 rounded-2xl text-[10px] font-black uppercase border border-red-900/30 active:scale-95">End Match</button>
    </div>

    <div class="flex-grow"></div>
</div>

<div id="playerSelectModal" class="fixed inset-0 bg-black/90 z-[500] hidden flex-col items-center justify-end">
    <div class="bg-gray-900 w-full max-w-md rounded-t-3xl p-6 border-t border-gray-800 shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h3 id="playerModalTitle" class="text-xs font-black uppercase tracking-widest text-orange-500">Select Player</h3>
            <button onclick="closePlayerModal()" class="text-gray-500 text-xl">✕</button>
        </div>
        
        <div id="playerModalGrid" class="grid grid-cols-4 gap-3 mb-6">
            </div>

        <button onclick="closePlayerModal()" class="w-full py-3 bg-gray-800 rounded-xl text-[10px] font-bold text-gray-400 uppercase">Cancel</button>
    </div>
</div>
